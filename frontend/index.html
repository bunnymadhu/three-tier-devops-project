<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>DevOps 3-Tier App</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      margin: 0;
      padding: 0;
    }

    .container {
      width: 600px;
      margin: 50px auto;
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0px 5px 20px rgba(0, 0, 0, 0.2);
    }

    h1 {
      text-align: center;
      color: #333;
    }

    input {
      width: 70%;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      padding: 10px 15px;
      background: #007BFF;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #0056b3;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      background: #f1f1f1;
      margin: 5px 0;
      padding: 10px;
      border-radius: 5px;
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>🚀 DevOps 3-Tier Application</h1>

    <input type="text" id="messageInput" placeholder="Enter message">
    <button onclick="sendMessage()">Submit</button>

    <h3>Saved Messages</h3>
    <ul id="messages"></ul>

  </div>

  <script>

    const backendURL = "http://backend-service/message";

    function sendMessage() {

      let message = document.getElementById("messageInput").value;

      fetch(backendURL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ msg: message })
      })
        .then(res => res.json())
        .then(data => {
          loadMessages();
        });

    }

    function loadMessages() {

      fetch(backendURL)
        .then(res => res.json())
        .then(data => {

          let list = document.getElementById("messages");
          list.innerHTML = "";

          data.forEach(item => {
            let li = document.createElement("li");
            li.innerText = item.msg;
            list.appendChild(li);
          });

        });
    }

    window.onload = loadMessages;

  </script>

</body>

</html>
