name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build images
        run: |
          docker build -t bunnymadhu/frontend:latest ./frontend
          docker build -t bunnymadhu/backend:latest ./backend

      - name: Push images
        run: |
          docker push bunnymadhu/frontend:latest
          docker push bunnymadhu/backend:latest

      # - name: Setup kubeconfig
      #   run: |
      #     mkdir -p $HOME/.kube
      #     echo "${{ secrets.KUBE_CONFIG_B64 }}" | base64 --decode > $HOME/.kube/config

      - name: Setup kubeconfig
        run: |
          mkdir -p $HOME/.kube
          cp /home/admin/.kube/config $HOME/.kube/config

      - name: Test Kubernetes
        run: kubectl get nodes
          
      - name: Create Namespace
        run: |
         kubectl apply -f k8s/namespace.yaml
         kubectl wait --for=condition=Established namespace/three-tier --timeout=60s

      - name: Deploy Application
        run: kubectl apply -f k8s/